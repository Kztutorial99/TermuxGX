name: Pip Package Updater

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no PR created)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  update-pip-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools

      - name: Find requirements files
        id: find-requirements
        run: |
          files=$(find . -name "requirements*.txt" -not -name "*-lock.txt" | grep -v ".git" || true)
          echo "files=$files" >> $GITHUB_OUTPUT
          echo "Found files: $files"

      - name: Update pip packages
        id: update
        if: steps.find-requirements.outputs.files != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b chore/update-pip-packages-${{ github.run_id }}
          
          updated=false
          for file in ${{ steps.find-requirements.outputs.files }}; do
            echo "Updating $file..."
            base_name=$(basename "$file" .txt)
            if [ "$base_name" = "requirements" ]; then
              pip-compile --upgrade -o "${file}-lock.txt" "$file" 2>/dev/null || true
            else
              pip-compile --upgrade --output-file="${file%-lock.txt}-lock.txt" "$file" 2>/dev/null || true
            fi
            
            if [ -f "${file%-lock.txt}-lock.txt" ]; then
              git add "${file%-lock.txt}-lock.txt"
              updated=true
            fi
          done
          
          echo "updated=$updated" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.update.outputs.updated == 'true' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update pip packages'
          branch: chore/update-pip-packages-${{ github.run_id }}
          delete-branch: true
          title: 'chore: update pip packages'
          body: |
            Automated update of pip packages.
            
            This PR was created automatically by the Pip Package Updater workflow.
            
            ## Changes
            - Updated dependencies in requirements files to latest compatible versions
            
            ## Checklist
            - [ ] Tests pass with updated dependencies
            - [ ] Manual testing completed
            
            ---
            *Generated by GitHub Actions*
          labels: dependencies,automated-pr

      - name: Summary (dry-run)
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "## Dry Run Mode" >> $GITHUB_STEP_SUMMARY
          echo "No PR was created. Files updated:" >> $GITHUB_STEP_SUMMARY
          git diff --name-only HEAD~1 2>/dev/null || echo "No changes to show" >> $GITHUB_STEP_SUMMARY
